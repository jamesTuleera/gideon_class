<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header">
        <h1>Contact Us</h1>
    </div>

    <div class="main">
        <div class="contact-us-info">
            <div class="text-section">
                <h1 class="head-text">Get In Touch With Us</h1>
                <div class="contact-detail">
                    <p><i class="fa fa-envelope"></i> assist@elevatedreams.com</p>
                    <p><i class="fa fa-phone"></i> +91 123456789</p>
                </div>
            </div>

            <div class="form-section">

                    <form action="">
                        <input type="text" placeholder="Name"> <br>
                        <input type="email" placeholder="Email Address"> <br>
                        <input type="text" placeholder="Phone Number"><br>

                        <select name="" id="">
                            <option value="">Select Country of Residence</option>
                            <option value="">US</option>
                            <option value="">Ghan</option>
                            <option value="">Cameroon</option>
                            <option value="">Niger</option>
                            <option value="">Togo</option>
                            <option value="">Uk</option>
                            <option value="">Canada</option>
                        </select><br>

                        <select name="" id="">
                            <option value="">What service are you interested in</option>
                            <option value="">What service are you interested in</option>
                            <option value="">What service are you interested in</option>
                            <option value="">What service are you interested in</option>
                            <option value="">What service are you interested in</option>
                        </select><br>

                        <textarea name="" id="" placeholder="Brief description of your situation or Goals"></textarea> <br>
                        <button type="submit">Send Message</button>
                    </form>


            </div>



           

        </div>
         <div class="footer">
                <h2>Footer</h2>
            </div>
    </div>



    
</body>
</html>
